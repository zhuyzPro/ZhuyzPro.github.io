quick:
  - label: 器具
    value: 100-120ml 盖碗
    note: 白瓷器具便于观察香气和汤色。
  - label: 投茶
    value: 6-8g
    note: 先以 7g / 110ml 建立稳定基准。
  - label: 水温
    value: 95-100°C
    note: 根据焙火、叶质和实际汤感微调。
  - label: 出汤
    value: 前段快速
    note: 前三泡短时出汤，之后逐泡延长。

steps:
  - title: 温器与醒茶
    note: 用热水充分温热盖碗和品茗杯；是否润茶可根据批次和个人习惯决定。
  - title: 建立前段香气
    note: 前三泡保持稳定水温并快速出汤，先观察杯盖香、汤香和入口浓度。
  - title: 调整中段汤感
    note: 从第四泡开始逐步延长时间；偏浓则缩短出汤，偏薄则延长或提高水温。
  - title: 记录尾段变化
    note: 观察香气、甜感与汤体的持续度，为下一次投茶和时间调整留下依据。

adjustments:
  - title: 茶汤偏浓
    note: 减少投茶量，或缩短第二、三泡的浸泡时间。
  - title: 香气不够清晰
    note: 充分温器并提高水温，注水后及时出汤。
  - title: 焙火感偏重
    note: 适当减少投茶量，让茶汤稍作静置后再品饮。
  - title: 使用办公杯
    note: 降低投茶量并缩短浸泡，避免长时间闷泡。
