    principles:
      eyebrow: Documentation Standard
      title: 我们如何说明一款凤凰单枞
      copy: 高级感不能代替事实。每个页面都应让访客知道资料来自哪里、哪些已经确认、哪些仍需按批次判断。
      items:
        - number: "01"
          title: 真实批次
          desc: 茶品以独立编号对应公开资料，避免把不同年份与工艺状态混在一起。
        - number: "02"
          title: 信息边界
          desc: 行政产地、展示山场与批次记录分层表达，不使用无法核验的绝对化说法。
        - number: "03"
          title: 可执行参数
          desc: 冲泡建议给出器具、投茶量、水温与逐泡时间，并说明调整方向。
        - number: "04"
          title: 具体咨询
          desc: 咨询围绕香型、批次与使用场景展开，不用模糊话术代替产品说明。
